name: Build Flet APK
on: [push] # Sempre que você enviar código, ele gera um novo APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet Pillow
      - name: Build APK
        run: flet build apk
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build/apk/*.apk
