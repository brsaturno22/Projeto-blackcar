name: Build Flet APK
on: [push, workflow_dispatch] # Permite rodar manualmente também

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet and Pillow
        run: |
          python -m pip install --upgrade pip
          pip install "flet[all]" Pillow

      - name: Build APK
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Versão v4 é a mais estável agora
        with:
          name: app-release
          path: build/apk/*.apk
